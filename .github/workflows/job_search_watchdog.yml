name: job-search-watchdog

# CLEAN-FOREVER cron reliability. 2026-07-01 audit exposed GitHub Actions
# dropping scheduled workflows silently: 2026-06-30 = 0 scheduled runs,
# 2026-06-29 = delayed 4h41m, 2026-06-27 + 2026-06-26 = failed. The primary
# workflow's own 4 daily crons help but do not eliminate the class of failure.
#
# This watchdog runs HOURLY (24 fires/day). Each fire checks whether the
# primary job_search_daily has a successful run within the last 24h. If yes:
# no-op. If no: dispatch job_search_daily.yml via the GH API.
#
# Even if GitHub drops 20 of the 24 hourly fires, the remaining 4 still catch
# a missed daily. This is the in-repo, PAT-free, deploy-free equivalent of an
# external cron trigger. Uses GITHUB_TOKEN (auto-injected, workflow scope).
#
# Requires the `actions: write` permission below to call
# actions.createWorkflowDispatch on the primary workflow.

on:
  schedule:
    # Hourly fire — 06:07 UTC through 20:07 UTC covers Paris waking hours.
    # Off-peak minute (:07) to reduce GH Actions cron load-drop risk.
    - cron: "7 6-20 * * *"
  workflow_dispatch:

concurrency:
  group: job-search-watchdog
  cancel-in-progress: true

permissions:
  contents: read
  actions: write   # required to dispatch job_search_daily via the API

jobs:
  check-and-dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check last successful job_search_daily and dispatch if missing
        uses: actions/github-script@v7
        env:
          # Hours since the last successful primary run before we dispatch.
          # 20h: allows the primary 07:13 UTC cron to land normally; only
          # kicks in after 03:13 UTC next day if nothing has fired.
          MAX_HOURS_SINCE_SUCCESS: "20"
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow_id = "job_search_daily.yml";
            const maxHours = parseInt(process.env.MAX_HOURS_SINCE_SUCCESS, 10);

            // Get last 20 runs of the primary workflow.
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner, repo, workflow_id, per_page: 20,
            });

            const successful = (data.workflow_runs || []).filter(r =>
              r.status === "completed" && r.conclusion === "success"
            );

            if (successful.length === 0) {
              core.warning("No successful runs in last 20 — dispatching.");
              await github.rest.actions.createWorkflowDispatch({
                owner, repo, workflow_id, ref: "main",
              });
              core.notice("Dispatched job_search_daily (no successful runs found).");
              return;
            }

            const last = successful[0];
            const lastMs = new Date(last.updated_at).getTime();
            const nowMs = Date.now();
            const hoursAgo = (nowMs - lastMs) / 3_600_000;

            core.notice(`Last successful run: ${last.updated_at} (${hoursAgo.toFixed(1)}h ago)`);

            if (hoursAgo >= maxHours) {
              core.warning(`Threshold exceeded (${hoursAgo.toFixed(1)}h >= ${maxHours}h). Dispatching.`);
              await github.rest.actions.createWorkflowDispatch({
                owner, repo, workflow_id, ref: "main",
              });
              core.notice("Watchdog dispatch fired.");
            } else {
              core.notice(`Within threshold (${hoursAgo.toFixed(1)}h < ${maxHours}h). No dispatch.`);
            }
