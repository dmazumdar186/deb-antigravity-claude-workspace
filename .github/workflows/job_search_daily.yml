name: job-search-daily

# v2 — multi-source FR PM aggregator (France Travail + LinkedIn-via-Gmail-IMAP).
# Replaces v1 (Adzuna-only) as of 2026-06-15. See JOB_SEARCH_SHEET_AUDIT.md for
# the rationale and directives/personal_workflows/job_search_sheet_v2.md for the spec.
#
# The cron is in PROBATIONARY status until the front-door synthetic passes 5
# consecutive days per ~/.claude/rules/front-door-synthetic.md. Day 1 = 2026-06-15.

on:
  schedule:
    # Dual cron targeting ~09:13 Paris time year-round (operator in Paris).
    # GitHub Actions cron has no timezone support, so DST is handled via
    # month-gated parallel schedules:
    #   - Apr-Oct (CEST = UTC+2): 07:13 UTC = 09:13 Paris
    #   - Nov-Mar (CET  = UTC+1): 08:13 UTC = 09:13 Paris
    #
    # The :13 minute is deliberate. GitHub Actions docs warn that schedules at
    # the top of the hour ("0 7 * * *") collide with the workload peak — runs
    # were delayed 2-5 hours in late June 2026 on this repo (28370125041
    # scheduled 2026-06-29T07:00Z, started 11:54Z; 4h54 lag). Off-peak minutes
    # reduce the delay materially.
    #
    # On DST-transition weeks (last Sunday of March / October) the cron fires
    # 1h early; this is unavoidable without an external scheduler. The
    # email_lock floor (6h, run.py default) prevents both schedules from
    # double-sending on overlap days.
    # Belt-and-suspenders: TWO scheduled fires per day, ~40min apart. GitHub
    # Actions drops scheduled workflows under platform load (2026-06-30 dropped
    # entirely; 2026-06-29 delayed 4h41m). The concurrency group below
    # (cancel-in-progress: false) means the second fire is queued if the first
    # is still running, or fires cleanly if the first was dropped. External CF
    # Cron trigger is the real fix; this is the in-repo mitigation.
    - cron: "13 7 * 4-10 *"
    - cron: "53 7 * 4-10 *"
    - cron: "13 8 * 1-3,11-12 *"
    - cron: "53 8 * 1-3,11-12 *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Don't append to sheet / send email — just produce the run summary."
        required: false
        default: false
        type: boolean
      no_location_filter:
        description: "Skip the FR-locked location filter (debugging only)."
        required: false
        default: false
        type: boolean

concurrency:
  group: job-search-daily
  cancel-in-progress: false  # let in-flight runs complete

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Decode service-account JSON
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}
        run: |
          mkdir -p credentials
          echo "$GOOGLE_SERVICE_ACCOUNT_JSON_B64" | base64 -d > credentials/service_account.json
          python -c "import json; json.load(open('credentials/service_account.json'))"

      - name: Compute cache key bits
        id: cache_keys
        # GitHub Actions does NOT run shell substitution inside `key:` — the previous
        # `$(date +%Y-%m)` literal was treated as a constant string, which made the
        # cache key the same forever and (per actions/cache@v4 semantics) the cache
        # was saved exactly once and never updated. seen.db therefore stayed empty
        # across runs and every job was "new" every day.
        run: |
          echo "month=$(date -u +%Y-%m)" >> $GITHUB_OUTPUT
          echo "run_key=${{ github.run_id }}-${{ github.run_attempt }}" >> $GITHUB_OUTPUT

      - name: Restore persistent dedup DB across runs
        # Save with a unique-per-run key so every run writes a fresh snapshot; restore
        # from the most recent snapshot via restore-keys so cross-day dedup actually works.
        uses: actions/cache@v4
        with:
          path: .tmp/job_search_v2/seen.db
          key: job-search-v2-seen-db-${{ github.workflow }}-${{ steps.cache_keys.outputs.month }}-${{ steps.cache_keys.outputs.run_key }}
          restore-keys: |
            job-search-v2-seen-db-${{ github.workflow }}-${{ steps.cache_keys.outputs.month }}-
            job-search-v2-seen-db-${{ github.workflow }}-

      - name: Run job_search_v2 orchestrator
        env:
          # France Travail OAuth2
          FRANCE_TRAVAIL_CLIENT_ID: ${{ secrets.FRANCE_TRAVAIL_CLIENT_ID }}
          FRANCE_TRAVAIL_CLIENT_SECRET: ${{ secrets.FRANCE_TRAVAIL_CLIENT_SECRET }}
          # LinkedIn via Gmail IMAP (reuses v1's SMTP App Password)
          GMAIL_SMTP_USER: ${{ secrets.GMAIL_SMTP_USER }}
          GMAIL_SMTP_APP_PASSWORD: ${{ secrets.GMAIL_SMTP_APP_PASSWORD }}
          GMAIL_NOTIFY_TO: ${{ secrets.GMAIL_NOTIFY_TO }}
          # Google Sheets append
          SHEETS_SPREADSHEET_ID: ${{ secrets.SHEETS_SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_PATH: credentials/service_account.json
          # Gemini 2.5 Flash ranker (free tier). Without this, every job becomes a
          # tier-B placeholder and the "Top Matches" tab is unrankable.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # ANTHROPIC_API_KEY: passed through so that removing --no-sonnet-rerank
          # (below) is a one-line change once the Anthropic console is topped up.
          # If the secret is unset, sonnet_rerank silently no-ops with a clean
          # skipped_reason ("ANTHROPIC_API_KEY not in environment"). No error.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          if [ "${{ github.event.inputs.no_location_filter }}" = "true" ]; then
            FLAGS="$FLAGS --no-location-filter"
          fi
          # WTTJ + APEC sources are present but live ingest is gated (consent-blocked); they
          # return [] cleanly. Pipeline still ships with France Travail + LinkedIn-via-Gmail.
          #
          # --no-sonnet-rerank: the Anthropic console balance is €0. The rerank code
          # path still calls the API (something in GH secrets is providing a key),
          # gets "credit balance too low", and burns a slot with `failed:25` in every
          # run_log. Explicit --no-sonnet-rerank makes the run-log show a clean
          # `skipped_reason: "sonnet rerank disabled (flag or config)"`. Remove this
          # flag the moment the console gets topped up.
          python execution/personal_workflows/job_search_v2/run.py --mode live --no-sonnet-rerank $FLAGS

      - name: Run front-door synthetic
        # Per ~/.claude/rules/front-door-synthetic.md, v2 is PROBATIONARY until this
        # passes 5 consecutive days. Phases 1+2 use fixtures (no API spend); phase 3
        # opens the LIVE sheet — needs SHEETS_SPREADSHEET_ID + service-account creds.
        # No longer continue-on-error: a failing synthetic must fail the cron, not be
        # masked by an `if: always()` success-summary step. (Previously the missing
        # SHEETS_SPREADSHEET_ID was silently failing phase 3 on every run.)
        if: always()
        env:
          SHEETS_SPREADSHEET_ID: ${{ secrets.SHEETS_SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_PATH: credentials/service_account.json
        run: bash tests/front_door_job_search_v2.sh

      - name: Write GitHub Step Summary
        if: always()
        run: |
          if [ -f .tmp/job_search_v2/run_log.jsonl ]; then
            LAST_RUN=$(tail -1 .tmp/job_search_v2/run_log.jsonl)
            echo "### Job Search v2 — latest run" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            echo "$LAST_RUN" | python -m json.tool >> "$GITHUB_STEP_SUMMARY" || echo "$LAST_RUN" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Sheet: https://docs.google.com/spreadsheets/d/${{ secrets.SHEETS_SPREADSHEET_ID }}/edit" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "⚠️  PROBATIONARY FRONT-DOOR SYNTHETIC — v2 is not 'ready' until 5 consecutive green days." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No run_log.jsonl produced — pipeline likely errored before Stage 5." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Assert email fired or skipped deliberately
        # Last line of defense — even if the orchestrator returned 0, sanity-check
        # the run-log: either the email actually went out, or the skip was for an
        # explicit, named reason (dual-cron lock OR acceptance gate). A False-with-
        # no-reason is the silent-failure class this assertion exists to surface.
        if: always()
        run: |
          if [ ! -f .tmp/job_search_v2/run_log.jsonl ]; then
            echo "::error::no run_log.jsonl — pipeline died before Stage 5"
            exit 1
          fi
          python - <<'PY'
          import json, sys, pathlib
          last = pathlib.Path(".tmp/job_search_v2/run_log.jsonl").read_text(encoding="utf-8").strip().splitlines()[-1]
          rec = json.loads(last)
          email_sent = bool(rec.get("email_sent"))
          lock = str(rec.get("email_lock") or "")
          acceptance = str(rec.get("acceptance") or "")
          dry = bool(rec.get("dry_run"))
          deliberate = (
              dry
              or lock.startswith("email lock [")
              or "skipped (acceptance" in lock
              or acceptance.startswith("FAIL")
          )
          if email_sent:
              print(f"::notice::email fired (subject={rec.get('email_subject')!r})")
              sys.exit(0)
          if deliberate:
              print(f"::warning::email skipped deliberately — lock={lock!r} acceptance={acceptance!r}")
              sys.exit(0)
          print(f"::error::email_sent=false with NO deliberate skip — lock={lock!r} acceptance={acceptance!r}")
          sys.exit(1)
          PY

      - name: Upload run-log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-search-v2-run-log-${{ github.run_id }}
          path: |
            .tmp/job_search_v2/run_log.jsonl
            .tmp/job_search_v2/runs/
          if-no-files-found: ignore
          retention-days: 7
