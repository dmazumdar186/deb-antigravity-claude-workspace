# account_id is auto-detected from `wrangler whoami` — leave blank.
# KV ids are resource IDs, not secrets — safe to commit (standard Cloudflare practice).

name = "cv-optimizer-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
account_id = ""  # Set via: wrangler whoami | sed-n find, OR by user before deploy. Leave blank in repo.

# KV namespace for rate-limiting per-IP request counters.
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "5df8e98dde324937aa5dc922b3c20464"
preview_id = "b37c69519eea405e8a9daf5597455ce1"

[vars]
# Version stamp shown in /api/health. Bump on each release.
APP_VERSION = "0.2.0"

# Single source of truth: regenerate src/embedded.generated.ts from prompts/*.{md,json}
# before every dev/deploy run. The generated file is gitignored.
[build]
command = "node scripts/embed-prompts.mjs"
