name = "accessory-masters-api"
main = "src/index.js"
compatibility_date = "2025-01-01"
account_id = "26e5b8612be35e5d23a9186fcf5288d0"

[triggers]
crons = ["5/30 * * * *", "0 6 * * *", "0 7 * * 1"]

[[kv_namespaces]]
binding = "REPLY_STATE"
id = "e38c04f316594621bacb3b0c3d7fd444"

[vars]
GHL_LOCATION_ID = "sCxQ92Y8b7PpfLloGqOn"
CAMPAIGN_ID = "bfa5c268-d8b9-466e-ae0c-50a18b5783c7"
# ALLOWED_ORIGINS: comma-separated list of front-end origins permitted to call /api/*.
# Includes the marketing site (website/) and the standalone dashboard project
# (website-dashboard/). Add the dashboard project's Vercel URL here after creating
# the new Vercel project from website-dashboard/.
ALLOWED_ORIGINS = "https://website-flame-phi-90.vercel.app,https://accessorymasters.com,https://accessory-masters-site.pages.dev,https://elitebrokergroup.com,https://website-dashboard-self.vercel.app,http://localhost:3000"

# Secrets (set via `wrangler secret put`):
# WORKER_SECRET (auth for admin endpoints — /api/run-pipeline, /api/process-replies, /api/weekly-report)
# INSTANTLY_WEBHOOK_SECRET (auth for /api/webhook/reply — set/rotate via execution/infrastructure/setup_instantly_webhook.py)
# GHL_API_KEY
# INSTANTLY_API_KEY
# OPENROUTER_API_KEY
# SERPER_API_KEY
# ANYMAILFINDER_API_KEY
# MILLION_VERIFIER_API_KEY
# TELEGRAM_BOT_TOKEN (when provided)
# TELEGRAM_CHAT_ID (fallback chat ID; used if the channel-specific IDs below aren't set)
# TELEGRAM_CHAT_ID_HIGH_PRIORITY (hot leads go here — Alex keeps notifications on)
# TELEGRAM_CHAT_ID_REGULAR (positive replies, weekly reports, mild interest)
# TELEGRAM_AUTHORIZED_USERS (comma-separated Telegram user IDs allowed to send commands like /status — Alex + Simon)
# TELEGRAM_WEBHOOK_SECRET (set via execution/infrastructure/setup_telegram_webhook.py — Telegram passes this back as X-Telegram-Bot-Api-Secret-Token)
# SLACK_WEBHOOK_URL (when provided)
